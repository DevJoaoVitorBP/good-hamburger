name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

  unit-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Run unit tests
        run: dotnet test GoodHamburguer.Test/GoodHamburguer.Test.csproj \
             --configuration Release \
             --verbosity normal \
             --logger "trx;LogFileName=unit-tests.trx" \
             --results-directory TestResults \
             --collect:"XPlat Code Coverage"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Run integration tests
        run: dotnet test GoodHamburger.API.IntegrationTests/GoodHamburger.API.IntegrationTests.csproj \
             --configuration Release \
             --verbosity normal \
             --logger "trx;LogFileName=integration-tests.trx" \
             --results-directory TestResults \
             --collect:"XPlat Code Coverage"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults
